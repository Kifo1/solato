services:
  db:
    image: mariadb:12.3.2
    container_name: solato-mariadb-dev
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-solato_db}
      MARIADB_USER: ${DB_USER:-solato_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-solato_pass}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: